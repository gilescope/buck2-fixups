name: CI

on:
  push:
    branches: [ 'main' ]
  pull_request:
      branches: [ '**' ]
  schedule:
    - cron: '14 5 * * 1'  # weekly full crate sweep
  workflow_dispatch:
    inputs:
      sweep:
        description: 'Run the full crate sweep (false = normal PR jobs)'
        type: boolean
        default: true

env:
  # Keep in sync with Earthfile ARG defaults. buck2 bundles its prelude, so
  # the binary and prelude can't drift.
  BUCK2_VERSION: 2026-06-01
  # reindeer built from the shared_fixups PR branch
  # (facebookincubator/reindeer#107) until it ships in a release; pinned by
  # commit. Keep in sync with Earthfile + ci.sh.
  REINDEER_GIT: https://github.com/gilescope/reindeer
  REINDEER_REV: a5a9f711abbdeafcd1e5750fb577d62d88a71edf

jobs:
  linux:
    name: linux ${{ matrix.arch }}
    # workflow_dispatch with sweep=false runs the normal PR jobs: the
    # dependabot helper uses it to re-run CI after pushing a fix (pushes made
    # with GITHUB_TOKEN don't retrigger pull_request workflows).
    if: github.event_name == 'push' || github.event_name == 'pull_request' || (github.event_name == 'workflow_dispatch' && !inputs.sweep)
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            arch: x86_64
          - runner: ubuntu-24.04-arm
            arch: aarch64
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
    env:
      FORCE_COLOR: 1
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0  # Full clone so we can diff against main

      - name: Install earthly
        uses: earthly/actions-setup@43211c7a0eae5344d6d79fb4aaf209c8f8866203 # v1.0.13
        with:
          version: v0.8.15

      - name: Buckify check + cell test
        run: earthly +ci

      - name: Build changed fixups
        run: |
          # Root fixups (fixups/<crate>) and conflict-rig overrides
          # (third-party/conflict-rigs/<rig>/fixups/<crate>) both map to a
          # crate name; +build-crates builds it in every rig that has it.
          diff=$(git diff --name-only origin/main...HEAD)
          crates=$( { echo "$diff" | sed -n 's#^fixups/\([^/]*\)/.*#\1#p'; \
                      echo "$diff" | sed -n 's#^third-party/conflict-rigs/[^/]*/fixups/\([^/]*\)/.*#\1#p'; } \
                    | sort -u | tr '\n' ' ')
          # A rig override may target a crate that's only transitive there, so
          # also build the whole rig when any of its own fixups change.
          rigs=$(echo "$diff" | sed -n 's#^\(third-party/conflict-rigs/[^/]*\)/fixups/.*#\1#p' | sort -u | tr '\n' ' ')
          if [ -n "${crates// /}" ] || [ -n "${rigs// /}" ]; then
            earthly +build-crates --crates="$crates" --rigs="$rigs"
          else
            echo "No fixups changed"
          fi

  macos:
    name: macos aarch64
    if: github.event_name == 'push' || github.event_name == 'pull_request' || (github.event_name == 'workflow_dispatch' && !inputs.sweep)
    runs-on: macos-latest
    permissions:
      contents: read
    env:
      FORCE_COLOR: 1
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Install buck2 + reindeer
        run: |
          curl -fsSL "https://github.com/facebook/buck2/releases/download/${BUCK2_VERSION}/buck2-aarch64-apple-darwin.zst" | zstd -d > /usr/local/bin/buck2
          chmod +x /usr/local/bin/buck2
          buck2 --version
          cargo install --locked --git "$REINDEER_GIT" --rev "$REINDEER_REV" reindeer

      - name: Run tests
        run: ./test.sh

  windows:
    name: windows ${{ matrix.arch }}
    if: github.event_name == 'push' || github.event_name == 'pull_request' || (github.event_name == 'workflow_dispatch' && !inputs.sweep)
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: windows-latest
            arch: x86_64
          - runner: windows-11-arm
            arch: aarch64
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
    env:
      FORCE_COLOR: 1
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Install buck2 + reindeer
        run: |
          # windows-11-arm images don't ship zstd (windows-latest does).
          command -v zstd >/dev/null || choco install -y zstandard --no-progress
          mkdir -p "$HOME/bin"
          curl -fsSL "https://github.com/facebook/buck2/releases/download/${BUCK2_VERSION}/buck2-${{ matrix.arch }}-pc-windows-msvc.exe.zst" | zstd -d > "$HOME/bin/buck2.exe"
          echo "$HOME/bin" >> "$GITHUB_PATH"
          # reindeer built from source (no prebuilt windows-arm binary anyway);
          # cargo installs it to ~/.cargo/bin, already on PATH.
          cargo install --locked --git "$REINDEER_GIT" --rev "$REINDEER_REV" reindeer
          uname -sm
          "$HOME/bin/buck2.exe" --version

      - name: Run tests
        # No crate builds on arm: the prelude's msvc discovery (vswhere.py)
        # hardcodes x64 lib paths, so aarch64 links fail (see issue tracker).
        # buckify + cell consumption still verify there.
        env:
          SKIP_CRATE_BUILDS: ${{ matrix.arch == 'aarch64' && '1' || '' }}
        run: ./test.sh

  sweep-linux:
    name: sweep linux ${{ matrix.arch }}
    if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.sweep)
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            arch: x86_64
          - runner: ubuntu-24.04-arm
            arch: aarch64
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 300
    permissions:
      contents: read
    env:
      FORCE_COLOR: 1
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Install earthly
        uses: earthly/actions-setup@43211c7a0eae5344d6d79fb4aaf209c8f8866203 # v1.0.13
        with:
          version: v0.8.15

      - name: Build all crates
        run: earthly +build-all

  sweep-macos:
    name: sweep macos aarch64
    if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.sweep)
    runs-on: macos-latest
    timeout-minutes: 300
    permissions:
      contents: read
    env:
      FORCE_COLOR: 1
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      # pyo3 0.24 supports python <= 3.13; the runner default is newer.
      - name: Pin python for pyo3
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.13'

      - name: Install buck2 + reindeer
        run: |
          curl -fsSL "https://github.com/facebook/buck2/releases/download/${BUCK2_VERSION}/buck2-aarch64-apple-darwin.zst" | zstd -d > /usr/local/bin/buck2
          chmod +x /usr/local/bin/buck2
          cargo install --locked --git "$REINDEER_GIT" --rev "$REINDEER_REV" reindeer

      - name: Build all crates
        run: ./build-all.sh

  # x86_64 only: the prelude's msvc discovery can't link aarch64 yet (x64
  # lib paths hardcoded in vswhere.py), so an arm sweep would be ~all noise.
  sweep-windows:
    name: sweep windows x86_64
    if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.sweep)
    runs-on: windows-latest
    timeout-minutes: 300
    permissions:
      contents: read
    env:
      FORCE_COLOR: 1
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      # pyo3 0.24 supports python <= 3.13; the runner default is newer.
      - name: Pin python for pyo3
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.13'

      - name: Install buck2 + reindeer
        run: |
          mkdir -p "$HOME/bin"
          curl -fsSL "https://github.com/facebook/buck2/releases/download/${BUCK2_VERSION}/buck2-x86_64-pc-windows-msvc.exe.zst" | zstd -d > "$HOME/bin/buck2.exe"
          echo "$HOME/bin" >> "$GITHUB_PATH"
          cargo install --locked --git "$REINDEER_GIT" --rev "$REINDEER_REV" reindeer

      - name: Build all crates
        run: ./build-all.sh
