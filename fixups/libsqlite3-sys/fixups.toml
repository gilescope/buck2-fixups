# libsqlite3-sys (bundled feature, set in the rig manifest): the build script
# copies pre-generated bindings into OUT_DIR and compiles the shipped
# sqlite3.c; link its static lib from the buildscript out_dir.

cargo_env = true
rustc_flags = [
    "-Lnative=$(location :libsqlite3-sys-0.33-build-script-run[out_dir])",
    "-lstatic=sqlite3",
]

[buildscript.run.env]
OPT_LEVEL = "3"
