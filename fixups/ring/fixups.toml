# ring =0.16.20 (pre-prefix era): symbols are global/unprefixed, so no
# RING_CORE_PREFIX, no cargo_env, no ring_core_generated overlay. Windows ships
# preassembled `.obj` (not `.o`). cpu-intel.c is x86 CPUID detection, excluded on
# aarch64. Mirrors buck2's original pre-0.17 fixup. (No fiat/asm dir in 0.16.)

