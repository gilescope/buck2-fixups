#
# Unlike the facebook/buck2 shim we don't enable windows_raw_dylib on linux:
# raw-dylib is unstable on ELF with stable rustc (rust-lang/rust#135694).

# (--cfg is a no-op for pre-0.48 versions that never test it, so no version
# predicate is needed.)
['cfg(target_os = "windows")']
cfgs = ["windows_raw_dylib"]
