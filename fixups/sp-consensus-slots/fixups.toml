# Substrate/polkadot crate deriving Encode/Decode (parity-scale-codec): the derive
# uses proc-macro-crate which reads CARGO_MANIFEST_DIR; buck2 doesn't set it by
# default, so the derive can't resolve the codec crate and associated types go
# missing (E0220/E0277 cascade). cargo_env supplies the CARGO_* vars.
cargo_env = true
