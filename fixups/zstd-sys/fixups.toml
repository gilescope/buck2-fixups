# zstd-sys: the build script writes bindings into OUT_DIR and compiles the
# vendored zstd; link its static lib from the buildscript out_dir.

cargo_env = true
rustc_flags = [
    "-Lnative=$(location :zstd-sys-2-build-script-run[out_dir])",
    "-lstatic=zstd",
]

[buildscript.run.env]
OPT_LEVEL = "3"
